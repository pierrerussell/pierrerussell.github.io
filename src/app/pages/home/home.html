<section class="bento-home">
  <div class="container">
    <div class="bento-grid">
      <!-- Hero - spans 2 columns -->
      <div class="bento-card bento-hero">
        <div class="status-badge">
          <div class="status-indicator"></div>
          <span>Available for opportunities</span>
        </div>
        <h1>Hi, I'm Pierre</h1>
        <p class="hero-tagline">I build elegant solutions to complex problems through thoughtful architecture and clean code.</p>
        <div class="hero-actions">
          <a routerLink="/projects" class="btn-primary" (click)="trackButtonClick('view_projects')">View Projects</a>
          <a routerLink="/about" class="btn-secondary" (click)="trackButtonClick('about_me')">About Me</a>
        </div>
      </div>

      <!-- Location with Map -->
      <div class="bento-card bento-location">
        <div class="map-container">
          <iframe
            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d255281.19891888283!2d103.70416557439007!3d1.3143393791498051!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x31da11238a8b9375%3A0x887869cf52abf5c4!2sSingapore!5e0!3m2!1sen!2ssg!4v1699000000000!5m2!1sen!2ssg"
            loading="lazy"
            referrerpolicy="no-referrer-when-downgrade">
          </iframe>
        </div>
        <div class="location-overlay">
          <svg viewBox="0 0 24 24" fill="currentColor" class="location-icon">
            <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>
          </svg>
<!--          <span class="location-text">Singapore</span>-->
        </div>
      </div>

      <!-- Tech Carousel - full width -->
      <div class="bento-card bento-tech">
        <div class="carousel-wrapper">
          <div class="carousel-track">
            <span class="tech-item">Angular</span>
            <span class="tech-item">TypeScript</span>
            <span class="tech-item">C#</span>
            <span class="tech-item">.NET</span>
            <span class="tech-item">Python</span>
            <span class="tech-item">Azure</span>
            <span class="tech-item">SQL</span>
            <span class="tech-item">Git</span>
            <!-- Duplicate for seamless loop -->
            <span class="tech-item">Angular</span>
            <span class="tech-item">TypeScript</span>
            <span class="tech-item">C#</span>
            <span class="tech-item">.NET</span>
            <span class="tech-item">Python</span>
            <span class="tech-item">Azure</span>
            <span class="tech-item">SQL</span>
            <span class="tech-item">Git</span>
          </div>
        </div>
      </div>

      <!-- GitHub -->

        <svg viewBox="0 0 24 24" fill="currentColor" class="link-icon">
