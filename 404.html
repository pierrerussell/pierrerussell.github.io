<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Redirecting...</title>
  <script>
    // Single Page App GitHub Pages redirect
    // Stores the path in sessionStorage and redirects to index
    var pathSegmentsToKeep = 0; // Change to 1 if using a project repo (username.github.io/repo-name)

    var loc = window.location;
    var path = loc.pathname.split('/').slice(pathSegmentsToKeep + 1).join('/');
    var search = loc.search;
    var hash = loc.hash;

    sessionStorage.setItem('spa-redirect', path + search + hash);
    loc.replace(loc.origin + loc.pathname.split('/').slice(0, pathSegmentsToKeep + 1).join('/'));
  </script>
</head>
<body>
  Redirecting...
</body>
</html>
